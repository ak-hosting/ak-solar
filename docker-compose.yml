# AK Solar - Docker Compose
# Güneş enerjisi web sitesi için container orchestration

version: '3.8'

services:
  # Ana web sitesi
  web:
    build: .
    container_name: ak-solar-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./assets:/usr/share/nginx/html/assets
      - ./logs:/var/log/nginx
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - ak-solar-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis cache (opsiyonel)
  redis:
    image: redis:alpine
    container_name: ak-solar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ak-solar-network
    command: redis-server --appendonly yes

