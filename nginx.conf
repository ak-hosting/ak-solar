# AK Solar - Nginx Konfigürasyonu
# Güneş enerjisi web sitesi için optimize edilmiş nginx ayarları

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log formatı
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Temel ayarlar
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

    # Upstream (gelecekte load balancer için)
    upstream backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    # HTTP sunucu
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html index.htm;

        # Ana sayfa
        location / {
            try_files $uri $uri/ /index.html;
            
            # Cache ayarları
            location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                add_header Vary Accept-Encoding;
            }
            
            # HTML dosyaları için cache
            location ~* \.html$ {
                expires 1h;
                add_header Cache-Control "public";
            }
        }

        # API endpoint'leri (gelecekte)
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Form gönderimi
        location /submit-form {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Statik dosyalar
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            
            # Gzip için özel ayarlar
            location ~* \.(css|js)$ {
                gzip_static on;
            }
        }

        # Görseller için optimize edilmiş ayarlar
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            
            # WebP desteği
            location ~* \.webp$ {
                add_header Vary Accept;
            }
        }

        # Font dosyaları
        location ~* \.(woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
        }

        # PDF dosyaları
        location ~* \.pdf$ {
            expires 1d;
            add_header Cache-Control "public";
        }

        # Güvenlik - gizli dosyaları engelle
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # PHP dosyalarını engelle (statik site)
        location ~ \.php$ {
            deny all;
        }

        # Hata sayfaları
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
        }

        # Favicon
        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }

        # Robots.txt
        location = /robots.txt {
            log_not_found off;
            access_log off;
        }

        # Sitemap
        location = /sitemap.xml {
            log_not_found off;
            access_log off;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # HTTPS yönlendirmesi (production için)
    # server {
    #     listen 80;
    #     server_name aksolar.com www.aksolar.com;
    #     return 301 https://$server_name$request_uri;
    # }

    # HTTPS sunucu (production için)
    # server {
    #     listen 443 ssl http2;
    #     server_name aksolar.com www.aksolar.com;
    #     
    #     ssl_certificate /etc/ssl/certs/aksolar.com.crt;
